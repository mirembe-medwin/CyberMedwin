<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – CyberMedwin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
      padding: 40px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #0d6efd;
      color: white;
      padding: 30px 40px;
      border-bottom: 5px solid #fd7e14;
      border-radius: 8px;
      margin-bottom: 40px;
    }

    .badge-box {
      background-color: #000;
      padding: 20px;
      height: 140px;
      width: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .badge-box img {
      height: 110px;
      width: 110px;
      object-fit: contain;
    }

    .header-text h2 {
      font-size: 2.2rem;
      margin-bottom: 5px;
    }

    .form-section {
      background-color: #ffffff;
      padding: 40px;
      max-width: 600px;
      margin: auto;
      border-left: 6px solid #0d6efd;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    .form-label {
      font-weight: 600;
      color: #0d6efd;
    }

    .btn-login {
      background-color: #0d6efd;
      color: white;
      font-weight: bold;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
    }

    .btn-login:hover {
      background-color: #fd7e14;
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      color: #333;
    }

    .footer a {
      color: #0d6efd;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    .footer a:hover {
      color: #fd7e14;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="badge-box">
      <img src="D:\CyberMedwinProject\ok thats the image  .PNG" alt="D:\CyberMedwinProject\ok thats the image  .PNG">
    </div>
    <div class="header-text">
      <h2>Login to CyberMedwin</h2>
      <p>Welcome back, defender of the digital realm</p>
    </div>
  </div>

  <!-- Login Form -->
  <div class="form-section">
    <form>
      <div class="mb-3"><label class="form-label">Email Address</label><input type="email" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" required></div>
      <div class="mb-3"><label class="form-label">CAPTCHA Puzzle</label><input type="text" class="form-control" placeholder="What is 6 + 3?" required></div>
      <div class="mb-3"><a href="/forgot-password" style="color:#fd7e14;">Forgot your password?</a></div>
      <button type="submit" class="btn-login">Login</button>
    </form>
    <p class="mt-3">New to CyberMedwin? <a href="file:///D:/CyberMedwinProject/CyberMedwin%20Sign%20In.html">Sign in here</a></p>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>📞 Contact: +256-760167427</p>
    <p>Find us on:
      <a href="https://x.com/CyberMedwin">X</a>
      <a href="#">LinkedIn</a>
      <a href="#">Instagram</a>
      <a href="#">WhatsApp</a>
      <a href="#">YouTube</a>
    </p>
    <p>© 2025 CyberMedwin. Built with love and logic.</p>
  </div>

</body>
</html>
